; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Settings shared by every build environment.
[env]
platform = atmelavr
; CH340 clone Nanos usually ship the NEW bootloader (115200 baud upload).
; If uploads fail with "stk500_getsync(): not in sync", switch this between
; nanoatmega328 (old, 57600) and nanoatmega328new (new, 115200).
board = nanoatmega328new
framework = arduino
monitor_speed = 115200

; The firmware prints its status line on serial (115200) unconditionally.
[env:nanoatmega328]
