; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Settings shared by every build environment.
[env]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200

; Production build (no serial output).
[env:nanoatmega328]

; Bring-up / tuning build: adds DEBUG_SERIAL telemetry (input states, analog
; value/delta, sub-state, outputs) on the USB serial monitor at 115200 baud.
; Build/upload with:  pio run -e nanoatmega328_debug -t upload
[env:nanoatmega328_debug]
build_flags = -D DEBUG_SERIAL
